name: Leaderboard Update

on:
  workflow_dispatch: # Ручной запуск кнопкой

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Устанавливаем все нужные библиотеки, включая aiohttp для асинхронности
          pip install requests supabase python-dotenv aiohttp

      - name: Run collector
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          SOCIALDATA_API_KEY: ${{ secrets.SOCIALDATA_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python backend/collector.py
